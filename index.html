<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Nighthawks FF | Login</title>
  <meta name="description" content="Nighthawks Free Fire — India's premier esports tournament platform. Register your team and compete.">
  <link rel="stylesheet" href="style.css?v=3.0">
  <style>
    /* Animated orbs behind card */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.5;
      pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(0,229,255,0.2), transparent 70%);
      top: -100px; left: -80px;
      animation: float 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
      bottom: -80px; right: -60px;
      animation: float 10s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
      top: 50%; left: 60%;
      animation: float 12s ease-in-out infinite;
    }
    .brand-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.15);
      color: var(--cyan);
      padding: 6px 16px; border-radius: var(--radius-full);
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 20px;
      font-family: 'Orbitron', sans-serif;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), transparent);
      margin: 20px 0;
    }
  </style>
</head>

<body class="auth-bg">

  <!-- Dynamic particle canvas -->
  <canvas id="canvas-particles"></canvas>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <div class="auth-card tilt-card" data-tilt>
    <div class="tilt-card-inner">
      <img src="nighthawks-logo3.png" class="login-logo" alt="Nighthawks Logo">

      <div class="brand-badge">⚡ Esports Platform</div>

      <h2 class="glitch-header" data-text="WELCOME BACK" style="font-family:'Orbitron',sans-serif; font-size:20px; font-weight:800; color:var(--text-primary); margin-bottom:6px; letter-spacing:1px;">
        WELCOME BACK
      </h2>
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:24px; font-weight:500;">
        Enter your mobile number to continue
      </p>

      <input
        id="mobile"
        type="tel"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="10"
        placeholder="📱  Mobile Number (+91)"
        oninput="checkMobileStatus()"
        style="padding:15px 18px; font-size:16px;"
      />

      <!-- Register Form (new users) -->
      <div id="registerForm" class="form-slide hidden">
        <div class="divider"></div>
        <div class="input-box">
          <span class="icon user-icon"></span>
          <input id="team" placeholder="Team Name">
        </div>
        <div class="input-box">
          <span class="icon lock-icon"></span>
          <input id="newPassword" type="password" placeholder="Set Password" />
        </div>
        <button onclick="register()" class="glow-btn w-full">🚀 Create Account</button>
      </div>

      <!-- Login Form (existing users) -->
      <div id="loginForm" class="form-slide hidden">
        <div class="divider"></div>
        <div class="input-box">
          <span class="icon user-icon"></span>
          <input id="loginTeam" placeholder="Team Name">
        </div>
        <div class="input-box">
          <span class="icon lock-icon"></span>
          <input id="password" type="password" placeholder="Password" />
        </div>
        <button onclick="login()" class="glow-btn w-full">⚡ Sign In</button>
      </div>

      <p style="margin-top:18px; text-align:center;">
        <a href="#" onclick="openForgotPassword()">Forgot password?</a>
      </p>

      <p id="msg"></p>

      <div class="divider"></div>
      <p style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; font-weight:600;">
        Admin? <a href="admin-login.html" style="color:var(--primary);">Login here →</a>
      </p>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h2>Team Profile</h2>
      <div class="profile-content">
        <div style="text-align:center; margin-bottom:15px;">
          <img id="displayTeamLogo" src="" alt="Team Logo" 
               style="width:80px; height:80px; border-radius:50%; border:2px solid var(--cyan); object-fit:cover; margin:0 auto;">
        </div>
        <div class="input-group">
          <label>Team Name</label>
          <h3 id="displayTeamName" style="margin:5px 0;">--</h3>
        </div>
        <div class="input-group" style="margin-top:15px; text-align:left;">
          <label>Squad Members</label>
          <ul id="displayPlayerList" style="list-style:none; padding:0; margin-top:5px; color:var(--text-secondary);"></ul>
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:20px; justify-content:center;">
        <button onclick="closeProfile()" class="ghost-btn">Close</button>
        <button onclick="enableEditMode()" class="glow-btn">Edit Details</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=3.0"></script>
  <script>
    window.addEventListener('load', () => {
      if (localStorage.getItem('loggedInUser')) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
