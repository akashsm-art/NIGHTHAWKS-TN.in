<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Nighthawks FF | Admin Login</title>
  <meta name="description" content="Nighthawks FF Admin Login — Secure access to the tournament management panel.">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-bg">

  <!-- Dynamic particle canvas -->
  <canvas id="canvas-particles"></canvas>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <div class="auth-card tilt-card" data-tilt>
    <div class="tilt-card-inner">
      <img src="nighthawks-logo3.png" class="login-logo" alt="Nighthawks Logo">

      <div style="margin-bottom:20px;">
        <div style="display:inline-flex; align-items:center; gap:8px; background:var(--red-dim); color:var(--red); padding:6px 16px; border-radius:var(--radius-full); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; border:1px solid rgba(239,68,68,0.25);">
          🛡️ Admin Access
        </div>
      </div>

      <h2 class="glitch-header" data-text="ADMIN ACCESS" style="font-family:'Orbitron',sans-serif; font-size:20px; font-weight:800; color:var(--text-primary); margin-bottom:20px; letter-spacing:1.5px; display:block;">
        ADMIN PORTAL
      </h2>

      <div class="input-box">
        <span class="icon phone-icon"></span>
        <input id="adminMobile" placeholder="Admin Mobile Number" type="tel" inputmode="numeric">
      </div>

      <div class="input-box">
        <span class="icon lock-icon"></span>
        <input id="adminPassword" type="password" placeholder="Admin Password">
      </div>

      <button onclick="adminLogin()" class="glow-btn w-full">Sign In as Admin</button>

      <p id="msg"></p>

      <p style="margin-top:16px;">
        <a href="index.html" style="font-size:13px; color:var(--text-muted);">← Back to Player Login</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
