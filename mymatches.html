<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Nighthawks FF | My Matches</title>
  <meta name="description" content="View your registered matches, batch assignments, and match results.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=3.0">
</head>

<body>

  <!-- Dynamic particle canvas -->
  <canvas id="canvas-particles"></canvas>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Navbar -->
  <div class="nav-bar">
    <div class="nav-title">
      <img src="nighthawks-logo3.png" alt="NHK">
      <span class="glitch-header" data-text="My Matches">My Matches</span>
    </div>
    <div class="nav-right">
      <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="page">
    <h2 class="page-title">My <span>Matches</span></h2>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="filterMyMatches('all', this)">All</button>
      <button class="filter-btn" onclick="filterMyMatches('upcoming', this)">Upcoming</button>
      <button class="filter-btn" onclick="filterMyMatches('completed', this)">Completed</button>
    </div>

    <div id="myMatches"></div>
  </div>

  <script src="script.js?v=3.0"></script>
  <script>
    function filterMyMatches(filter, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const box = document.getElementById('myMatches');
      const loggedIn = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
      const regs = JSON.parse(localStorage.getItem('registrations') || '[]').filter(r => r.team === loggedIn.team);
      const matches = JSON.parse(localStorage.getItem('matches') || '[]');

      let filtered = regs;
      if (filter !== 'all') {
        filtered = regs.filter(r => {
          const match = matches.find(m => m.id === r.matchId);
          if (!match) return false;
          if (filter === 'upcoming') return match.status !== 'Completed';
          if (filter === 'completed') return match.status === 'Completed';
          return true;
        });
      }

      if (filtered.length === 0) {
        box.innerHTML = `
          <div class="empty-box">
            <div class="empty-icon">🎮</div>
            <p>No ${filter === 'all' ? '' : filter} matches found</p>
            <p style="font-size:13px; color:var(--text-muted); margin-top:8px;">Register for matches from the Dashboard</p>
          </div>`;
        return;
      }

      box.innerHTML = '';
      filtered.forEach(r => {
        const match = matches.find(m => m.id === r.matchId);
        const status = match ? match.status : 'Unknown';
        const statusClass = status === 'Live' ? 'status-live' : status === 'Completed' ? 'status-completed' : 'status-upcoming';

        const rooms = JSON.parse(localStorage.getItem('rooms') || '{}');
        const room = rooms[r.matchId];

        const div = document.createElement('div');
        div.className = 'my-match-card tilt-card';
        div.setAttribute('data-tilt', '');

        const details = Array.isArray(r.rosterDetail) ? r.rosterDetail : [
          { name: r.players[0] || 'Player 1', role: 'IGL', uid: 'N/A' },
          { name: r.players[1] || 'Player 2', role: 'Assaulter', uid: 'N/A' },
          { name: r.players[2] || 'Player 3', role: 'Sniper', uid: 'N/A' },
          { name: r.players[3] || 'Player 4', role: 'Support', uid: 'N/A' }
        ];

        const detailHtml = details.map(d => {
          const roleClass = d.role === 'IGL' ? 'role-igl' : d.role === 'Sniper' ? 'role-sniper' : d.role === 'Assaulter' ? 'role-assaulter' : 'role-support';
          return `
            <div class="roster-list-item" style="padding:6px 12px; margin-top:6px; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
              <span class="roster-list-player">${d.name} <span class="role-badge ${roleClass}" style="margin-left:6px; font-size:8px; padding:2px 6px;">${d.role}</span></span>
              <span class="roster-list-uid">UID: ${d.uid}</span>
            </div>
          `;
        }).join('');

        div.innerHTML = `
          <div class="tilt-card-inner">
            <div class="flex-between mb-sm">
              <h3 style="margin:0; font-family:'Orbitron',sans-serif;">${r.team}</h3>
              <span class="status-badge ${statusClass}">${status}</span>
            </div>
            <p><i class="fas fa-clock" style="color:var(--primary); margin-right:6px;"></i> ${r.batch} · ${r.time}</p>
            <div style="margin-top:12px;">
              <span style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Roster Details</span>
              ${detailHtml}
            </div>
            <p style="font-size:11px; color:var(--text-muted); margin-top:12px;">Registered: ${r.registeredAt || 'N/A'}</p>
            ${room ? `
              <div class="room-box mt-sm">
                <p style="color:var(--primary); font-weight:700; margin-bottom:4px;">🔑 Room Credentials</p>
                <p>Room ID: <strong>${room.id}</strong></p>
                <p>Password: <strong>${room.pass}</strong></p>
              </div>
            ` : ''}
            ${match && match.winner ? `
              <div style="margin-top:12px; padding:12px; background:var(--gold-dim); border-radius:8px; border:1px solid var(--gold);">
                <p style="color:var(--gold); font-weight:700;">🏆 Winner: ${match.winner}</p>
                ${match.resultNote ? `<p style="font-size:13px; color:var(--text-secondary);">${match.resultNote}</p>` : ''}
              </div>
            ` : ''}
          </div>
        `;
        box.appendChild(div);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      filterMyMatches('all', document.querySelector('.filter-btn'));
    });
  </script>
</body>
</html>
